services:
  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: order-support-voice-backend:latest
    container_name: order_support_voice_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  backend-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: order-support-voice-backend:latest
    container_name: order_support_voice_worker
    command: ["python", "worker.py", "dev"]
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    depends_on:
      - backend-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-https://backend-dj2b.onrender.com}
    image: order-support-voice-frontend:latest
    container_name: order_support_voice_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
    restart: unless-stopped
